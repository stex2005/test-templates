name: Post Test Report template

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull Request #
        required: true
        type: string

jobs:
  post-comment:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Post Test Report template comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ inputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body-file .github/TEST_REPORT_TEMPLATE.md
